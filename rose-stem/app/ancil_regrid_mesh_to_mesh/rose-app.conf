[command]
default=ug-ants-launch regrid_mesh_to_mesh.py \
       =${source}  ${output} \
       =--target-mesh ${mesh_file} --target-mesh-name ${mesh_name} \
       =--horizontal-regrid-scheme ${regrid_scheme}
tolerance=ug-ants-launch regrid_mesh_to_mesh.py \
         =${source}  ${output} \
         =--target-mesh ${mesh_file} --target-mesh-name ${mesh_name} \
         =--horizontal-regrid-scheme ${regrid_scheme} \
         =--tolerance ${tolerance}

[env]
mesh_file=${TEST_SOURCES_DIR}/global/C24/multi_mesh.nc
mesh_name=dynamics
output=${ROSE_DATA}/${ROSE_TASK_NAME}.nc
regrid_scheme=${scheme}
source=${TEST_SOURCES_DIR}/global/C48/mesh_to_mesh_regrid_source.nc
tolerance=0.5
