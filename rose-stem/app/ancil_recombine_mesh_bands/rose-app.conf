[command]
default=ug-ants-launch recombine_bands_grid_to_mesh.py \
       =${mesh_band_mapping} \
       ="${bands_dir}/regridded_band_*.nc" \
       =${output}

[env]
bands_dir=${ROSE_DATA}/ancil_band_regrid_grid_to_mesh_${CYLC_TASK_PARAM_scheme}
mesh_band_mapping=${ROSE_DATA}/ancil_split_by_latitude_grid_to_mesh/mesh_band_mapping.nc
output=${ROSE_DATA}/${ROSE_TASK_NAME}.nc
