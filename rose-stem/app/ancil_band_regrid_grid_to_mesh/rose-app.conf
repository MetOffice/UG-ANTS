mode=rose_bunch

[bunch]
command-format=ug-ants-launch regrid_to_mesh.py \
              =${source_dir}/source_band_%(band_num)s.nc \
              =${output_dir}/regridded_band_%(band_num)s.nc \
              =--target-mesh ${source_dir}/mesh_band_%(band_num)s.nc \
              =--target-mesh-name ${mesh_name} --horizontal-regrid-scheme ${scheme} \
              =--tolerance ${tolerance}
pool-size=4

[bunch-args]
band_num=$band_nums

[env]
mesh_name=dynamics
output_dir=${ROSE_DATA}/${ROSE_TASK_NAME}
scheme=${CYLC_TASK_PARAM_scheme}
source_dir=${ROSE_DATA}/ancil_split_by_latitude_grid_to_mesh
tolerance=0

[file:${ROSE_DATA}/${ROSE_TASK_NAME}]
mode=mkdir
